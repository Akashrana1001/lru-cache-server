version: '3.8'

services:
  lru-cache-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lru_cache_server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    volumes:
      - ./logs:/usr/src/app/logs
